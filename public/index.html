<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokets App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h2>Acceso</h2>
            <input type="text" id="nickname-input" placeholder="Nombre de usuario:">
            <button id="login-btn" class="btn-principal">Ingresar</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>Sokets</h1>
            <div id="user-info">
                Usuario: <b id="display-nickname"></b> | 
                Sala: <span id="nombre-sala-badge" class="badge-sala">programacion</span>
                <button id="logout-btn" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="grid-layout">
            <div class="col-left">
                <div class="card">
                    <div class="sala-selector">
                        <label>Sala:</label>
                        <select id="sala-select">
                            <option value="programacion">Programación</option>
                            <option value="videojuegos">Videojuegos</option>
                            <option value="deportes">Deportes</option>
                        </select>
                    </div>
                    <h2 id="pregunta">Cargando...</h2>
                    <div id="opciones-container"></div>
                    <div class="conteo-container">
                        Usuarios en sala: <b id="usuarios-conteo">0</b>
                    </div>
                </div>

                <div class="card">
                    <h2>Reacciones</h2>
                    <div class="reacciones-flex">
                        <span onclick="enviarReaccion('🔥')">🔥</span>
                        <span onclick="enviarReaccion('❤️')">❤️</span>
                        <span onclick="enviarReaccion('👍')">👍</span>
                        <span onclick="enviarReaccion('🚀')">🚀</span>
                        <span onclick="enviarReaccion('😂')">😂</span>
                        <span onclick="enviarReaccion('💯')">💯</span>
                        <span onclick="enviarReaccion('⭐')">⭐</span>
                        <span onclick="enviarReaccion('🎉')">🎉</span>
                        <span onclick="enviarReaccion('🤯')">🤯</span>
                        <span onclick="enviarReaccion('🤔')">🤔</span>
                    </div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <h2>Chat</h2>
                    <div id="chat-mensajes"></div>
                    <div class="chat-input-group">
                        <input type="text" id="mensaje-input" placeholder="Escribe un mensaje...">
                        <button id="enviar-btn" class="btn-principal">Enviar</button>
                    </div>
                </div>

                <div class="card">
                    <h2>Juego (1v1)</h2>
                    <div id="juego-container">
                        <button id="buscar-partida-btn" class="btn-principal">Buscar Partida</button>
                        <div id="estado-busqueda"></div>
                        
                        <div id="area-juego" style="display: none;">
                            <p>Contra: <b id="nombre-oponente"></b></p>
                            <div class="game-buttons">
                                <button class="game-btn" onclick="elegir('Piedra')">Piedra</button>
                                <button class="game-btn" onclick="elegir('Papel')">Papel</button>
                                <button class="game-btn" onclick="elegir('Tijeras')">Tijeras</button>
                            </div>
                            <div id="espera-oponente"></div>
                        </div>
                        <div id="resultado-juego"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const seleccionar = s => document.querySelector(s);

        let salaActual = 'programacion';
        let miApodo = '';
        let idPartidaActual = null;
        let yaVoteEnEstaSala = false;

        // --- ELEMENTOS DEL DOM ---
        const elementos = {
            capaLogin: seleccionar('#login-overlay'),
            contenidoPrincipal: seleccionar('#main-content'),
            entradaApodo: seleccionar('#nickname-input'),
            btnIngresar: seleccionar('#login-btn'),
            btnSalir: seleccionar('#logout-btn'),
            mostrarApodo: seleccionar('#display-nickname'),
            badgeSala: seleccionar('#nombre-sala-badge'),
            selectorSala: seleccionar('#sala-select'),
            cajaChat: seleccionar('#chat-mensajes'),
            entradaMensaje: seleccionar('#mensaje-input'),
            btnEnviar: seleccionar('#enviar-btn'),
            pregunta: seleccionar('#pregunta'),
            opciones: seleccionar('#opciones-container'),
            conteo: seleccionar('#usuarios-conteo'),
            btnBuscar: seleccionar('#buscar-partida-btn'),
            estadoBusqueda: seleccionar('#estado-busqueda'),
            areaJuego: seleccionar('#area-juego'),
            oponente: seleccionar('#nombre-oponente'),
            espera: seleccionar('#espera-oponente'),
            resultado: seleccionar('#resultado-juego')
        };

        // --- PERSISTENCIA DE SESIÓN ---
        const apodoGuardado = localStorage.getItem('sokets_apodo');
        if (apodoGuardado) {
            socket.emit('autenticacion:iniciar', apodoGuardado);
        }

        // Evitar recarga accidental
        window.onbeforeunload = (e) => {
            if (miApodo) {
                const mensaje = "Es posible que los cambios no se guarden.";
                e.preventDefault();
                e.returnValue = mensaje;
                return mensaje;
            }
        };

        // --- AUTENTICACIÓN ---
        elementos.btnIngresar.onclick = () => {
            const apodo = elementos.entradaApodo.value.trim();
            if (apodo) {
                socket.emit('autenticacion:iniciar', apodo);
            }
        };

        elementos.entradaApodo.onkeypress = e => { if (e.key === 'Enter') elementos.btnIngresar.click(); };

        elementos.btnSalir.onclick = () => {
            localStorage.removeItem('sokets_apodo');
            location.reload();
        };

        socket.on('autenticacion:exito', ({ apodo }) => {
            miApodo = apodo;
            localStorage.setItem('sokets_apodo', apodo);
            elementos.mostrarApodo.textContent = apodo;
            elementos.capaLogin.style.display = 'none';
            elementos.contenidoPrincipal.style.display = 'block';
            socket.emit('sala:unirse', salaActual);
        });

        socket.on('autenticacion:error', mensaje => alert(mensaje));

        // --- SALAS ---
        elementos.selectorSala.onchange = e => {
            salaActual = e.target.value;
            elementos.badgeSala.textContent = salaActual;
            elementos.cajaChat.innerHTML = '';
            yaVoteEnEstaSala = false;
            socket.emit('sala:unirse', salaActual);
        };

        socket.on('usuarios:conteo', cantidad => {
            elementos.conteo.textContent = cantidad;
        });

        // --- ENCUESTA ---
        const renderizarEncuesta = (datos) => {
            elementos.pregunta.textContent = datos.pregunta;
            elementos.opciones.innerHTML = '';
            
            if (datos.yaVoto !== undefined) yaVoteEnEstaSala = datos.yaVoto;
            if (datos.ultimoVotante === miApodo) yaVoteEnEstaSala = true;

            const totalVotos = Object.values(datos.opciones).reduce((a, b) => a + b, 0);

            Object.entries(datos.opciones).forEach(([opcion, votos]) => {
                const porcentaje = totalVotos ? Math.round((votos / totalVotos) * 100) : 0;
                
                if (yaVoteEnEstaSala) {
                    const div = document.createElement('div');
                    div.className = 'resultado-voto';
                    div.innerHTML = `
                        <div class="voto-info">
                            <span>${opcion}</span>
                            <span>${votos} (${porcentaje}%)</span>
                        </div>
                        <div class="barra-votos"><div class="barra-progreso" style="width:${porcentaje}%"></div></div>
                    `;
                    elementos.opciones.appendChild(div);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'opcion-btn';
                    btn.textContent = opcion;
                    btn.onclick = () => socket.emit('encuesta:votar', { sala: salaActual, opcion: opcion });
                    elementos.opciones.appendChild(btn);
                }
            });
        };

        socket.on('encuesta:estado', renderizarEncuesta);
        socket.on('encuesta:resultado', renderizarEncuesta);
        socket.on('encuesta:error', mensaje => alert(mensaje));

        // --- CHAT ---
        const agregarMensaje = ({ usuario, texto, fecha }) => {
            const div = document.createElement('div');
            div.className = 'msg-item';
            div.innerHTML = `<strong>${usuario}</strong> <small>${fecha}</small><br>${texto}`;
            elementos.cajaChat.appendChild(div);
            elementos.cajaChat.scrollTop = elementos.cajaChat.scrollHeight;
        };

        elementos.btnEnviar.onclick = () => {
            const texto = elementos.entradaMensaje.value.trim();
            if (texto) {
                socket.emit('chat:mensaje', { sala: salaActual, texto });
                elementos.entradaMensaje.value = '';
            }
        };

        elementos.entradaMensaje.onkeypress = e => { if (e.key === 'Enter') elementos.btnEnviar.click(); };

        socket.on('chat:mensaje', agregarMensaje);
        socket.on('chat:historial', historial => historial.forEach(agregarMensaje));

        // --- REACCIONES ---
        window.enviarReaccion = emoji => socket.emit('reaccion:enviar', { sala: salaActual, emoji });

        socket.on('reaccion:mostrar', emoji => {
            const el = document.createElement('div');
            el.className = 'reaccion-animada';
            el.textContent = emoji;
            el.style.left = `${Math.random() * 80 + 10}%`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        });

        // --- JUEGO ---
        elementos.btnBuscar.onclick = () => {
            socket.emit('juego:buscar');
            elementos.btnBuscar.disabled = true;
            elementos.estadoBusqueda.textContent = 'Buscando...';
            elementos.resultado.innerHTML = '';
        };

        socket.on('juego:esperando', mensaje => elementos.estadoBusqueda.textContent = mensaje);

        socket.on('juego:inicio', datos => {
            idPartidaActual = datos.idPartida;
            const oponente = datos.oponente1 === miApodo ? datos.oponente2 : datos.oponente1;
            elementos.btnBuscar.style.display = 'none';
            elementos.areaJuego.style.display = 'block';
            elementos.oponente.textContent = oponente;
            elementos.espera.textContent = '';
            elementos.estadoBusqueda.textContent = 'Partida en curso';
            document.querySelectorAll('.game-btn').forEach(b => b.disabled = false);
        });

        window.elegir = movimiento => {
            socket.emit('juego:eleccion', { idPartida: idPartidaActual, eleccion: movimiento });
            document.querySelectorAll('.game-btn').forEach(b => b.disabled = true);
        };

        socket.on('juego:esperando_oponente', mensaje => elementos.espera.textContent = mensaje);

        socket.on('juego:resultado', ({ ganador, elecciones }) => {
            let claseResultado = '';
            let textoResultado = '';
            
            const miEleccion = elecciones[miApodo];
            const apodoOponente = Object.keys(elecciones).find(n => n !== miApodo);
            const eleccionOponente = elecciones[apodoOponente];

            if (ganador === 'Empate') {
                textoResultado = '¡EMPATE!';
                claseResultado = 'res-empate';
            } else if (ganador === miApodo) {
                textoResultado = '¡GANASTE!';
                claseResultado = 'res-ganaste';
            } else {
                textoResultado = 'PERDISTE...';
                claseResultado = 'res-perdiste';
            }
            
            elementos.resultado.innerHTML = `
                <div class="final-res ${claseResultado}">
                    <h3>${textoResultado}</h3>
                    <div class="res-detalle">
                        <span>Tú: <b>${miEleccion}</b></span>
                        <span>Oponente: <b>${eleccionOponente}</b></span>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                idPartidaActual = null;
                elementos.areaJuego.style.display = 'none';
                elementos.btnBuscar.style.display = 'inline-block';
                elementos.btnBuscar.disabled = false;
                elementos.estadoBusqueda.textContent = '';
                elementos.resultado.innerHTML = ''; 
            }, 5000);
        });
    </script>
</body>
</html>
