<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokets App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h2>Acceso</h2>
            <input type="text" id="nickname-input" placeholder="Nombre de usuario...">
            <button id="login-btn" class="btn-principal">Ingresar</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>Sokets</h1>
            <div id="user-info">
                Usuario: <b id="display-nickname"></b> | 
                Sala: <span id="nombre-sala-badge" class="badge-sala">programacion</span>
                <button id="logout-btn" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="grid-layout">
            <div class="col-left">
                <div class="card">
                    <div class="sala-selector">
                        <label>Sala:</label>
                        <select id="sala-select">
                            <option value="programacion">Programacion</option>
                            <option value="videojuegos">Videojuegos</option>
                            <option value="deportes">Deportes</option>
                        </select>
                    </div>
                    <h2 id="pregunta">Cargando...</h2>
                    <div id="opciones-container"></div>
                    <div class="conteo-container">
                        Usuarios en sala: <b id="usuarios-conteo">0</b>
                    </div>
                </div>

                <div class="card">
                    <h2>Reacciones</h2>
                    <div class="reacciones-flex">
                        <span onclick="enviarReaccion('🔥')">🔥</span>
                        <span onclick="enviarReaccion('❤️')">❤️</span>
                        <span onclick="enviarReaccion('👍')">👍</span>
                        <span onclick="enviarReaccion('🚀')">🚀</span>
                        <span onclick="enviarReaccion('😂')">😂</span>
                        <span onclick="enviarReaccion('💯')">💯</span>
                        <span onclick="enviarReaccion('⭐')">⭐</span>
                        <span onclick="enviarReaccion('🎉')">🎉</span>
                        <span onclick="enviarReaccion('🤯')">🤯</span>
                        <span onclick="enviarReaccion('🤔')">🤔</span>
                    </div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <h2>Chat</h2>
                    <div id="chat-mensajes"></div>
                    <div class="chat-input-group">
                        <input type="text" id="mensaje-input" placeholder="Mensaje...">
                        <button id="enviar-btn" class="btn-principal">Enviar</button>
                    </div>
                </div>

                <div class="card">
                    <h2>Juego (1v1)</h2>
                    <div id="juego-container">
                        <button id="buscar-partida-btn" class="btn-principal">Buscar Partida</button>
                        <div id="estado-busqueda"></div>
                        
                        <div id="area-juego" style="display: none;">
                            <p>Contra: <b id="nombre-oponente"></b></p>
                            <div class="game-buttons">
                                <button class="game-btn" onclick="elegir('Piedra')">Piedra</button>
                                <button class="game-btn" onclick="elegir('Papel')">Papel</button>
                                <button class="game-btn" onclick="elegir('Tijeras')">Tijeras</button>
                            </div>
                            <div id="espera-oponente"></div>
                        </div>
                        <div id="resultado-juego"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const qs = s => document.querySelector(s);

        let salaActual = 'programacion';
        let miNickname = '';
        let partidaIdActual = null;
        let yaVoteEnEstaSala = false;

        // --- DOM ELEMENTS ---
        const elements = {
            loginOverlay: qs('#login-overlay'),
            mainContent: qs('#main-content'),
            nickInput: qs('#nickname-input'),
            loginBtn: qs('#login-btn'),
            logoutBtn: qs('#logout-btn'),
            displayNick: qs('#display-nickname'),
            salaBadge: qs('#nombre-sala-badge'),
            salaSelect: qs('#sala-select'),
            chatBox: qs('#chat-mensajes'),
            msgInput: qs('#mensaje-input'),
            sendBtn: qs('#enviar-btn'),
            pregunta: qs('#pregunta'),
            opciones: qs('#opciones-container'),
            conteo: qs('#usuarios-conteo'),
            buscarBtn: qs('#buscar-partida-btn'),
            estadoBusq: qs('#estado-busqueda'),
            areaJuego: qs('#area-juego'),
            oponente: qs('#nombre-oponente'),
            espera: qs('#espera-oponente'),
            resultado: qs('#resultado-juego')
        };

        // --- SESSION PERSISTENCE ---
        const savedNick = localStorage.getItem('sokets_nick');
        if (savedNick) {
            socket.emit('auth:login', savedNick);
        }

        // Evitar recarga accidental
        window.onbeforeunload = (e) => {
            if (miNickname) {
                const msg = "Es posible que los cambios no se guarden.";
                e.preventDefault();
                e.returnValue = msg;
                return msg;
            }
        };

        // --- AUTH ---
        elements.loginBtn.onclick = () => {
            const nick = elements.nickInput.value.trim();
            if (nick) {
                socket.emit('auth:login', nick);
            }
        };

        elements.nickInput.onkeypress = e => { if (e.key === 'Enter') elements.loginBtn.click(); };

        elements.logoutBtn.onclick = () => {
            localStorage.removeItem('sokets_nick');
            location.reload(); // La forma más limpia de resetear todo el estado
        };

        socket.on('auth:success', ({ nickname }) => {
            miNickname = nickname;
            localStorage.setItem('sokets_nick', nickname);
            elements.displayNick.textContent = nickname;
            elements.loginOverlay.style.display = 'none';
            elements.mainContent.style.display = 'block';
            socket.emit('sala:unirse', salaActual);
        });

        socket.on('auth:error', msg => alert(msg));

        // --- SALAS ---
        elements.salaSelect.onchange = e => {
            salaActual = e.target.value;
            elements.salaBadge.textContent = salaActual;
            elements.chatBox.innerHTML = '';
            yaVoteEnEstaSala = false; // Se reseteará con el evento encuesta:estado
            socket.emit('sala:unirse', salaActual);
        };

        socket.on('usuarios:conteo', count => {
            elements.conteo.textContent = count;
        });

        // --- ENCUESTA ---
        const renderEncuesta = (data) => {
            elements.pregunta.textContent = data.pregunta;
            elements.opciones.innerHTML = '';
            
            // Actualizar estado local si el servidor lo indica o si nosotros fuimos los últimos
            if (data.hasVoted !== undefined) yaVoteEnEstaSala = data.hasVoted;
            if (data.lastVoter === miNickname) yaVoteEnEstaSala = true;

            const total = Object.values(data.opciones).reduce((a, b) => a + b, 0);

            Object.entries(data.opciones).forEach(([opt, votos]) => {
                const pc = total ? Math.round((votos / total) * 100) : 0;
                
                if (yaVoteEnEstaSala) {
                    // Mostrar resultados
                    const div = document.createElement('div');
                    div.className = 'resultado-voto';
                    div.innerHTML = `
                        <div class="voto-info">
                            <span>${opt}</span>
                            <span>${votos} (${pc}%)</span>
                        </div>
                        <div class="barra-votos"><div class="barra-progreso" style="width:${pc}%"></div></div>
                    `;
                    elements.opciones.appendChild(div);
                } else {
                    // Mostrar botones para votar
                    const btn = document.createElement('button');
                    btn.className = 'opcion-btn';
                    btn.textContent = opt;
                    btn.onclick = () => socket.emit('encuesta:votar', { sala: salaActual, opcion: opt });
                    elements.opciones.appendChild(btn);
                }
            });
        };

        socket.on('encuesta:estado', renderEncuesta);
        socket.on('encuesta:resultado', renderEncuesta);
        socket.on('encuesta:error', msg => alert(msg));

        // --- CHAT ---
        const addMsg = ({ usuario, texto, fecha }) => {
            const div = document.createElement('div');
            div.className = 'msg-item';
            div.innerHTML = `<strong>${usuario}</strong> <small>${fecha}</small><br>${texto}`;
            elements.chatBox.appendChild(div);
            elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
        };

        elements.sendBtn.onclick = () => {
            const texto = elements.msgInput.value.trim();
            if (texto) {
                socket.emit('chat:mensaje', { sala: salaActual, texto });
                elements.msgInput.value = '';
            }
        };

        elements.msgInput.onkeypress = e => { if (e.key === 'Enter') elements.sendBtn.click(); };

        socket.on('chat:mensaje', addMsg);
        socket.on('chat:historial', history => history.forEach(addMsg));

        // --- REACCIONES ---
        window.enviarReaccion = emoji => socket.emit('reaccion:enviar', { sala: salaActual, emoji });

        socket.on('reaccion:mostrar', emoji => {
            const el = document.createElement('div');
            el.className = 'reaccion-animada';
            el.textContent = emoji;
            el.style.left = `${Math.random() * 80 + 10}%`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        });

        // --- JUEGO ---
        elements.buscarBtn.onclick = () => {
            socket.emit('juego:buscar');
            elements.buscarBtn.disabled = true;
            elements.estadoBusq.textContent = 'Buscando...';
            elements.resultado.innerHTML = '';
        };

        socket.on('juego:esperando', msg => elements.estadoBusq.textContent = msg);

        socket.on('juego:inicio', data => {
            partidaIdActual = data.partidaId;
            const opp = data.oponente1 === miNickname ? data.oponente2 : data.oponente1;
            elements.buscarBtn.style.display = 'none';
            elements.areaJuego.style.display = 'block';
            elements.oponente.textContent = opp;
            elements.espera.textContent = '';
            elements.estadoBusq.textContent = 'Partida en curso';
            document.querySelectorAll('.game-btn').forEach(b => b.disabled = false);
        });

        window.elegir = move => {
            socket.emit('juego:eleccion', { partidaId: partidaIdActual, eleccion: move });
            document.querySelectorAll('.game-btn').forEach(b => b.disabled = true);
        };

        socket.on('juego:esperando_oponente', msg => elements.espera.textContent = msg);

        socket.on('juego:resultado', ({ ganador, elecciones }) => {
            let resClase = '';
            let resTexto = '';
            
            const misEleccion = elecciones[miNickname];
            const oponenteNick = Object.keys(elecciones).find(n => n !== miNickname);
            const oponenteEleccion = elecciones[oponenteNick];

            if (ganador === 'Empate') {
                resTexto = '¡EMPATE!';
                resClase = 'res-empate';
            } else if (ganador === miNickname) {
                resTexto = '¡GANASTE!';
                resClase = 'res-ganaste';
            } else {
                resTexto = 'PERDISTE...';
                resClase = 'res-perdiste';
            }
            
            elements.resultado.innerHTML = `
                <div class="final-res ${resClase}">
                    <h3>${resTexto}</h3>
                    <div class="res-detalle">
                        <span>Tú: <b>${misEleccion}</b></span>
                        <span>Oponente: <b>${oponenteEleccion}</b></span>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                partidaIdActual = null;
                elements.areaJuego.style.display = 'none';
                elements.buscarBtn.style.display = 'inline-block';
                elements.buscarBtn.disabled = false;
                elements.estadoBusq.textContent = '';
                elements.resultado.innerHTML = ''; // Limpiar el resultado visual
            }, 5000);
        });
    </script>
</body>
</html>
